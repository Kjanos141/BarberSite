<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció — Blackstone Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">

  <div class="auth-layout">
    <div class="auth-panel">
      <a href="index.html" class="auth-back">← Vissza a főoldalra</a>
      <div class="auth-brand">
        <span class="logo-mark large">B</span>
        <span class="logo-text">BLACKSTONE</span>
        <p class="auth-tagline">Meghívó alapú regisztráció</p>
      </div>
    </div>

    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <p class="form-eyebrow">Üdvözöljük</p>
        <h2 class="form-title">Fiók létrehozása</h2>
        <div class="gold-rule"></div>

        <div id="tokenError" class="alert alert-error" style="display:none">
          Érvénytelen vagy lejárt meghívó link. Kérjen új meghívót az adminisztrátortól.
        </div>

        <form id="registerForm" action="php/register.php" method="POST">
          <input type="hidden" id="token" name="token">
          <div class="form-group">
            <label for="regName">Teljes név</label>
            <input type="text" id="regName" name="name" placeholder="Kiss János" required>
          </div>
          <div class="form-group">
            <label for="regEmail">E-mail cím</label>
            <input type="email" id="regEmail" name="email" placeholder="nev@email.hu" required readonly>
          </div>
          <div class="form-group">
            <label for="regPassword">Jelszó</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" name="password" placeholder="Min. 8 karakter" required minlength="8">
              <button type="button" class="toggle-pw" id="togglePwReg">👁</button>
            </div>
          </div>
          <div class="form-group">
            <label for="regPassword2">Jelszó megerősítése</label>
            <input type="password" id="regPassword2" name="password2" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-gold full-w">Fiók létrehozása</button>
        </form>

        <p class="auth-note">Ha problémád van a regisztrációval,<br>vedd fel a kapcsolatot az adminisztrátorral.</p>
      </div>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
