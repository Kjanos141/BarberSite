<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bejelentkezés — Blackstone Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="auth-page">

  <div class="auth-layout">
    <!-- LEFT PANEL -->
    <div class="auth-panel">
      <a href="index.html" class="auth-back">← Vissza a főoldalra</a>
      <div class="auth-brand">
        <span class="logo-mark large">B</span>
        <span class="logo-text">BLACKSTONE</span>
        <p class="auth-tagline">Prémium Barbér Rendszer</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-form-panel">
      <div class="auth-form-wrap">
        <p class="form-eyebrow">Üdvözöljük</p>
        <h2 class="form-title">Bejelentkezés</h2>
        <div class="gold-rule"></div>

        <div id="loginError" class="alert alert-error" style="display:none"></div>

        <form id="loginForm" action="php/login.php" method="POST">
          <div class="form-group">
            <label for="email">E-mail cím</label>
            <input type="email" id="email" name="email" placeholder="nev@email.hu" required autocomplete="email">
          </div>
          <div class="form-group">
            <label for="password">Jelszó</label>
            <div class="input-wrap">
              <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
              <button type="button" class="toggle-pw" id="togglePw">👁</button>
            </div>
          </div>
          <button type="submit" class="btn btn-gold full-w">Belépés</button>
        </form>

        <p class="auth-note">Fiókot kizárólag meghívó alapján lehet létrehozni.<br>Ha meghívót kaptál, ellenőrizd az e-mailed.</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
