<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Blackstone Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-mark">B</span>
      <span class="logo-text">BLACKSTONE</span>
    </div>
    <nav class="sidebar-nav">
      <a href="admin.html" class="sidebar-link active">
        <span class="nav-icon">◉</span> Áttekintés
      </a>
      <a href="admin-users.html" class="sidebar-link">
        <span class="nav-icon">◎</span> Felhasználók
      </a>
      <a href="admin-invite.html" class="sidebar-link">
        <span class="nav-icon">✉</span> Meghívó küldés
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">Admin</span>
          <span class="user-role">Adminisztrátor</span>
        </div>
      </div>
      <a href="php/logout.php" class="logout-btn">Kilépés</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="burger-btn" id="sidebarToggle">☰</button>
      <h1 class="admin-page-title">Áttekintés</h1>
    </div>

    <div class="admin-content">

      <!-- STAT CARDS -->
      <div class="stat-cards">
        <div class="stat-card">
          <p class="stat-label">Összes felhasználó</p>
          <span class="stat-big" id="statTotal">—</span>
        </div>
        <div class="stat-card">
          <p class="stat-label">Aktív felhasználó</p>
          <span class="stat-big gold" id="statActive">—</span>
        </div>
        <div class="stat-card">
          <p class="stat-label">Függő meghívó</p>
          <span class="stat-big" id="statPending">—</span>
        </div>
        <div class="stat-card">
          <p class="stat-label">Admin fiók</p>
          <span class="stat-big" id="statAdmins">—</span>
        </div>
      </div>

      <!-- RECENT USERS -->
      <div class="admin-card">
        <div class="card-header">
          <h3>Legutóbbi felhasználók</h3>
          <a href="admin-users.html" class="card-action">Összes megtekintése →</a>
        </div>
        <div class="table-wrap">
          <table class="data-table" id="recentUsersTable">
            <thead>
              <tr>
                <th>Név</th>
                <th>E-mail</th>
                <th>Szerep</th>
                <th>Státusz</th>
                <th>Regisztrált</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="5" class="table-loading">Betöltés...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- QUICK INVITE -->
      <div class="admin-card">
        <div class="card-header">
          <h3>Gyors meghívó küldés</h3>
        </div>
        <form id="quickInviteForm" class="inline-form">
          <div class="form-row">
            <div class="form-group">
              <label>E-mail cím</label>
              <input type="email" id="inviteEmail" name="email" placeholder="nev@email.hu" required>
            </div>
            <div class="form-group">
              <label>Szerep</label>
              <select id="inviteRole" name="role">
                <option value="user">Felhasználó</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <div class="form-group align-end">
              <button type="submit" class="btn btn-gold">Meghívó küldése</button>
            </div>
          </div>
          <div id="inviteMsg" class="alert" style="display:none"></div>
        </form>
      </div>

    </div>
  </main>

  <!-- INVITE MODAL (reusable) -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
